  <body>

    <header>
      <div class="logo">
        <h1 class="logo">DiscoverRomania</h1>

      <main>
        <h2>Get in touch</h2>
        <p>Please fill out the quick form and we will be in touch with lightening speed.</p>
        <form class="contact-form" action="index.html" method="post" id="contact">
          <label for="userName">Name:</label>
          <input type="text" id="userName">
          <label for="email">Email:</label>
          <input type="email" id="email" required>
          <label for="message">Message:</label>
          <textarea rows="4" cols="50" name="comment" form="contact" id="message" placeholder="Enter text here..."></textarea>
          <button class="submit-button" type="submit" name="button">Submit</button>
          <p>Want to learn more about Romania? <a href="file:///D:/TA/JavaScript/Fundamentals/Proiect1%20Adina%20Adam/subscribe.html">subscribe</a> to our newsletter and get your weekly dose, right in your email.</p>
        </form>
      </main>
